<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carta · Pedido</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --text: #1a1d21;
    --muted: #6b7280;
    --line: #e5e7eb;
    --brand: #128c7e;
    --brand-dark: #075e54;
    --accent: #25d366;
    --danger: #ef4444;
    --shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1418; --card: #1b2127; --text: #e9edf0; --muted: #9aa4ae;
      --line: #2a323a; --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    padding-bottom: 96px;
  }

  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--brand-dark); color: #fff;
    padding: 12px 16px 10px; box-shadow: var(--shadow);
  }
  header h1 { margin: 0 0 8px; font-size: 18px; font-weight: 700; }
  .search {
    width: 100%; padding: 10px 12px; border: none; border-radius: 10px;
    font-size: 15px; background: rgba(255,255,255,.15); color: #fff;
  }
  .search::placeholder { color: rgba(255,255,255,.7); }
  .search:focus { outline: 2px solid var(--accent); background: rgba(255,255,255,.22); }

  .cats {
    display: flex; gap: 8px; overflow-x: auto; padding: 10px 16px;
    position: sticky; top: 64px; z-index: 15; background: var(--bg);
    scrollbar-width: none;
  }
  .cats::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; padding: 6px 14px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--line); color: var(--text);
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  main { padding: 4px 12px 12px; }
  .cat-title {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted); margin: 18px 6px 8px;
    scroll-margin-top: 150px;
  }

  .item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border-radius: 12px; padding: 12px;
    margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer;
  }
  .item:active { transform: scale(.995); }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 600; margin: 0 0 2px; }
  .item-desc { font-size: 12px; color: var(--muted); margin: 0 0 4px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .item-price { font-size: 14px; font-weight: 700; color: var(--brand); }
  .item-add {
    position: relative; width: 36px; height: 36px; border-radius: 9px; flex: 0 0 auto;
    background: var(--brand); color: #fff; border: none; font-size: 22px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .qbadge {
    position: absolute; top: -6px; right: -6px; min-width: 18px; height: 18px;
    background: var(--danger); color: #fff; border-radius: 999px; font-size: 11px;
    font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 4px;
  }

  /* Barra inferior */
  .bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    background: var(--card); border-top: 1px solid var(--line);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    box-shadow: 0 -2px 10px rgba(0,0,0,.08);
    transform: translateY(130%); transition: transform .22s ease;
  }
  .bar.show { transform: translateY(0); }
  .cta {
    width: 100%; border: none; border-radius: 12px; padding: 14px;
    background: var(--brand); color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  }
  .cta .count { background: rgba(255,255,255,.25); border-radius: 999px; padding: 2px 10px; font-size: 14px; }

  /* Sheets (checkout lateral, ficha inferior) */
  .sheet {
    position: fixed; inset: 0; z-index: 40; background: var(--bg);
    transform: translateX(100%); transition: transform .25s ease;
    overflow-y: auto; padding-bottom: 40px;
  }
  .sheet.show { transform: translateX(0); }
  .sheet header { background: var(--brand-dark); display: flex; align-items: center; gap: 12px; }
  .sheet header h1 { margin: 0; }
  .back { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 0 4px; }
  .sec { padding: 16px; }

  /* Ficha de plato (bottom sheet) */
  .dish {
    position: fixed; inset: 0; z-index: 50; display: flex; align-items: flex-end;
    background: rgba(0,0,0,.45); opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  .dish.show { opacity: 1; pointer-events: auto; }
  .dish-card {
    width: 100%; background: var(--bg); border-radius: 18px 18px 0 0; padding: 20px 16px calc(16px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .25s ease; max-height: 88vh; overflow-y: auto;
  }
  .dish.show .dish-card { transform: translateY(0); }
  .dish-close { float: right; background: none; border: none; color: var(--muted); font-size: 26px; cursor: pointer; line-height: 1; }
  .dish-card h2 { margin: 0 6px 6px 0; font-size: 20px; }
  .dish-desc { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 0 0 10px; }
  .dish-price { font-size: 18px; font-weight: 800; color: var(--brand); margin-bottom: 14px; }
  .dish-actions { display: flex; gap: 12px; align-items: center; margin-top: 18px; }
  .add-cart {
    flex: 1; border: none; border-radius: 12px; padding: 14px; background: var(--brand);
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    display: flex; justify-content: center; gap: 8px;
  }

  /* Stepper */
  .stepper { display: flex; align-items: center; gap: 4px; }
  .stepper button {
    width: 40px; height: 44px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); color: var(--text); font-size: 22px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0;
  }
  .stepper .qty { min-width: 30px; text-align: center; font-weight: 700; font-size: 17px; }

  /* Formularios */
  label.f { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin: 14px 0 6px; }
  input.t, textarea.t {
    width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 15px; background: var(--card); color: var(--text);
  }
  .addr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .addr-grid .col2 { grid-column: 1 / 3; }

  .toggle { display: flex; gap: 8px; margin-top: 6px; }
  .toggle button {
    flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .toggle button.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  /* Carrito */
  .cline { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .cline-body { flex: 1; min-width: 0; }
  .cline-name { font-size: 15px; font-weight: 600; }
  .cline-note { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .cline-note button { background: none; border: none; color: var(--brand); font-size: 12px; cursor: pointer; padding: 0; text-decoration: underline; }
  .cline-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .cline-sub { font-size: 14px; font-weight: 700; }
  .cline-ctrl { display: flex; align-items: center; gap: 2px; }
  .cline-ctrl button {
    width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0;
  }
  .cline-ctrl .n { min-width: 24px; text-align: center; font-weight: 700; }

  .breakdown { margin: 14px 0 4px; }
  .brk { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; color: var(--muted); }
  .brk.total { font-size: 19px; font-weight: 800; color: var(--text); padding-top: 10px; border-top: 1px solid var(--line); margin-top: 6px; }
  .warn { background: rgba(239,68,68,.1); color: var(--danger); border-radius: 10px; padding: 10px 12px; font-size: 13px; margin-top: 10px; }

  .send {
    width: 100%; border: none; border-radius: 12px; padding: 15px; margin-top: 20px;
    background: var(--accent); color: #05271b; font-size: 16px; font-weight: 800; cursor: pointer;
  }
  .send:disabled { opacity: .5; cursor: default; }

  .status { text-align: center; padding: 40px 20px; }
  .status .emoji { font-size: 54px; }
  .status h2 { margin: 12px 0 6px; }
  .status p { color: var(--muted); }
  .hidden { display: none !important; }
  .loading { text-align: center; color: var(--muted); padding: 40px; }
  .field-err { border-color: var(--danger) !important; }
  .note-inp { width: 100%; padding: 6px 8px; border: 1px solid var(--brand); border-radius: 8px; font-size: 13px; background: var(--card); color: var(--text); }
  .toast {
    position: fixed; left: 50%; bottom: 92px; transform: translateX(-50%) translateY(20px);
    background: #1f2937; color: #fff; padding: 12px 18px; border-radius: 12px; font-size: 14px;
    font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,.35); z-index: 60; opacity: 0;
    pointer-events: none; transition: opacity .2s ease, transform .2s ease; max-width: 86%; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Banner "cerrado ahora" */
  .closed-banner {
    background: #7c2d12; color: #fff; font-size: 13px; font-weight: 600;
    padding: 10px 16px; text-align: center; line-height: 1.4;
  }

  /* Alérgenos */
  .alerg-title { font-size: 12px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em; margin: 10px 0 4px; }
  .alerg-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 6px; }
  .alerg { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
    background: rgba(234,179,8,.16); color: #a16207; border: 1px solid rgba(234,179,8,.35); }
  .alerg-none { font-size: 13px; color: var(--muted); margin: 4px 0 6px; }
  @media (prefers-color-scheme: dark) { .alerg { color: #fde68a; } }

  /* Plato agotado */
  .item.sold { opacity: .55; cursor: default; }
  .item.sold:active { transform: none; }
  .item.sold .item-name { text-decoration: line-through; }
  .sold-badge { display: inline-block; font-size: 11px; font-weight: 700; color: var(--danger);
    border: 1px solid var(--danger); border-radius: 6px; padding: 1px 7px; margin-left: 6px; vertical-align: middle; }

  /* Plato destacado */
  .star { color: #f59e0b; margin-right: 3px; }

  /* Spinner de carga */
  .spinner { width: 34px; height: 34px; margin: 0 auto 14px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--brand); animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <header>
    <h1 id="localName">Carta</h1>
    <input class="search" id="search" placeholder="🔎 Buscar plato…" autocomplete="off">
  </header>

  <div class="closed-banner hidden" id="closedBanner"></div>

  <div class="cats" id="cats"></div>

  <main id="menu">
    <div class="loading" id="loading">Cargando carta…</div>
  </main>

  <!-- Barra inferior -->
  <div class="bar" id="bar">
    <button class="cta" id="goCheckout">
      <span>Ver pedido</span>
      <span class="count" id="barCount">0 · 0,00 €</span>
    </button>
  </div>

  <!-- Ficha de plato -->
  <div class="dish" id="dish">
    <div class="dish-card">
      <button class="dish-close" id="dishClose">×</button>
      <h2 id="dishName"></h2>
      <p class="dish-desc" id="dishDesc"></p>
      <div id="dishAlerg"></div>
      <div class="dish-price" id="dishPrice"></div>
      <label class="f">Indicación para este plato</label>
      <input class="t" id="dishNote" placeholder="Opcional">
      <div class="dish-actions">
        <div class="stepper">
          <button id="dishMinus">−</button>
          <span class="qty" id="dishQty">1</span>
          <button id="dishPlus">+</button>
        </div>
        <button class="add-cart" id="dishAdd">Añadir · 0,00 €</button>
      </div>
    </div>
  </div>

  <!-- Checkout -->
  <div class="sheet" id="checkout">
    <header>
      <button class="back" id="back">‹</button>
      <h1>Tu pedido</h1>
    </header>
    <div class="sec" id="checkoutBody">
      <div id="cartLines"></div>

      <div class="breakdown" id="breakdown"></div>
      <div class="warn hidden" id="minWarn"></div>

      <label class="f">Nombre — confírmalo o cámbialo</label>
      <input class="t" id="fNombre" placeholder="Tu nombre" autocomplete="name">

      <label class="f">Teléfono (tu WhatsApp) — confírmalo o cámbialo</label>
      <input class="t" id="fTel" type="tel" placeholder="Tu teléfono" autocomplete="tel">

      <label class="f">¿Cómo lo recibes?</label>
      <div class="toggle" id="tgEntrega">
        <button data-e="pickup" class="active">🏃 Recoger</button>
        <button data-e="delivery">🛵 A domicilio</button>
      </div>

      <div id="dirWrap" class="hidden">
        <label class="f">Dirección de entrega</label>
        <div class="addr-grid">
          <input class="t col2" id="aCalle" placeholder="Calle / Avenida" autocomplete="address-line1">
          <input class="t" id="aNumero" placeholder="Número" inputmode="numeric">
          <input class="t" id="aPiso" placeholder="Piso / Puerta">
          <input class="t" id="aCp" placeholder="Código postal" inputmode="numeric">
          <input class="t" id="aCiudad" placeholder="Ciudad" autocomplete="address-level2">
          <input class="t col2" id="aNota" placeholder="Indicaciones para el repartidor">
        </div>
      </div>

      <label class="f">¿Cómo pagas?</label>
      <div class="toggle" id="tgPago">
        <button data-p="tarjeta" class="active">💳 Tarjeta</button>
        <button data-p="metalico">💵 Metálico</button>
      </div>

      <div id="cashWrap" class="hidden">
        <label class="f">¿Con cuánto pagas? (para el cambio)</label>
        <input class="t" id="fPagaCon" type="text" inputmode="decimal" placeholder="Importe con el que pagas">
        <div id="cambioInfo" class="brk" style="padding-top:8px;"></div>
      </div>

      <label class="f">Indicaciones para el restaurante</label>
      <textarea class="t" id="fNotas" rows="2" placeholder="Opcional"></textarea>

      <button class="send" id="send">Enviar pedido</button>
    </div>

    <div class="status hidden" id="done">
      <div class="emoji">✅</div>
      <h2>¡Pedido enviado!</h2>
      <p>Vuelve a WhatsApp: el restaurante te confirmará en un momento.</p>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  const P = new URLSearchParams(location.search);
  const WA   = P.get('wa')  || '';
  const NAME = P.get('n')   || '';
  const RID  = P.get('r')   || 'demo';
  const API  = (P.get('api') || 'https://n8n.danipr20.com').replace(/\/$/, '');
  const MENU_URL   = `${API}/webhook/menu?r=${encodeURIComponent(RID)}&_=${Date.now()}`;
  const PEDIDO_URL = `${API}/webhook/pedido-web`;

  // Config de negocio: llega del backend (hoja "config"); la URL puede forzar valores.
  const URL_ENVIO = P.get('envio'), URL_MIN = P.get('min');
  let COSTE_ENVIO   = parseFloat(URL_ENVIO || '2.50');
  let PEDIDO_MINIMO = parseFloat(URL_MIN   || '10');   // mínimo domicilio
  let MIN_RECOGIDA  = 0;
  let BIZ = {};                 // config del negocio (nombre, horario, envío…)
  let cerradoAhora = false;
  const USE_DEMO = P.get('demo') === '1';   // menú de ejemplo, solo para pruebas locales

  const DEMO = [
    { cat: 'Entrantes', nom: 'Croquetas de jamón', prec: 6.5, desc: 'Ración de 8 croquetas caseras de jamón ibérico, bechamel cremosa.' },
    { cat: 'Entrantes', nom: 'Ensalada César', prec: 7.9, desc: 'Lechuga, pollo a la plancha, parmesano, picatostes y salsa César.' },
    { cat: 'Pizzas', nom: 'Margarita', prec: 8.5, desc: 'Tomate, mozzarella fresca y albahaca.' },
    { cat: 'Pizzas', nom: 'Barbacoa', prec: 11.0, desc: 'Ternera, bacon, pollo y salsa barbacoa.' },
    { cat: 'Hamburguesas', nom: 'Clásica', prec: 9.0, desc: 'Ternera 180g, cheddar, lechuga, tomate y salsa de la casa.' },
    { cat: 'Bebidas', nom: 'Coca-Cola', prec: 2.2, desc: 'Lata 33cl.' },
    { cat: 'Postres', nom: 'Tarta de queso', prec: 4.5, desc: 'Casera, con base de galleta y mermelada de frutos rojos.' },
  ];

  let carta = [];
  let lines = [];               // [{ nom, prec, qty, nota }]
  let entrega = 'pickup';
  let pago = 'tarjeta';
  let stickH = 0, lastActive = -1;
  let dishIdx = null, dishQty = 1;

  const LS_KEY = 'cartaCart_' + RID;
  const $ = s => document.querySelector(s);
  const fmt = n => (Number(n) || 0).toFixed(2).replace('.', ',') + ' €';

  // ── Persistencia ──
  function saveCart() { try { localStorage.setItem(LS_KEY, JSON.stringify(lines)); } catch (e) {} }
  function loadCart() { try { lines = JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch (e) { lines = []; } }

  // ── Normaliza un plato (del backend o del demo) con valores por defecto ──
  function withDefaults(p) {
    const alerg = Array.isArray(p.alerg) ? p.alerg
      : (p.alerg ? String(p.alerg).split(/[,;\/]/).map(s => s.trim()).filter(Boolean) : []);
    return {
      cat:  String(p.cat  || '').trim(),
      nom:  String(p.nom  || '').trim(),
      prec: parseFloat(String(p.prec).replace(',', '.')) || 0,
      desc: String(p.desc || '').trim(),
      disp: p.disp !== false,
      dest: !!p.dest,
      alerg,
      foto: p.foto || ''
    };
  }

  // ── Aplica la config del negocio (nombre, envío, mínimos, horario) ──
  function aplicarConfig(cfg) {
    BIZ = cfg || {};
    if (BIZ.nombre) { $('#localName').textContent = BIZ.nombre; document.title = BIZ.nombre + ' · Pedido'; }
    if (BIZ.envio        != null && !URL_ENVIO) COSTE_ENVIO   = BIZ.envio;
    if (BIZ.minDomicilio != null && !URL_MIN)   PEDIDO_MINIMO = BIZ.minDomicilio;
    if (BIZ.minRecogida  != null)               MIN_RECOGIDA  = BIZ.minRecogida;
    evaluarHorario();
  }

  // ── ¿Abierto ahora? (horario y día de cierre de la config) ──
  const DIAS = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  const sinAcento = s => String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  const aMin = t => { const m = String(t).match(/(\d{1,2})\D+(\d{2})/) || String(t).match(/(\d{1,2})/); return m ? (+m[1]) * 60 + (+(m[2] || 0)) : null; };
  function abiertoAhora() {
    if (!BIZ.apertura || !BIZ.cierre) return true;                 // sin horario => siempre abierto
    const now = new Date();
    const cerrados = sinAcento(BIZ.cerrado).split(/[,;\/]/).map(s => s.trim()).filter(Boolean);
    if (cerrados.includes(DIAS[now.getDay()])) return false;
    const a = aMin(BIZ.apertura), b = aMin(BIZ.cierre);
    if (a == null || b == null) return true;
    const n = now.getHours() * 60 + now.getMinutes();
    return b > a ? (n >= a && n < b) : (n >= a || n < b);          // b<a => cruza medianoche
  }
  function evaluarHorario() {
    cerradoAhora = !abiertoAhora();
    const banner = $('#closedBanner');
    if (cerradoAhora) {
      banner.textContent = '🌙 Cerrado ahora — puedes ver la carta, pero los pedidos se abren en horario.';
      banner.classList.remove('hidden');
    } else banner.classList.add('hidden');
    if ($('#checkout').classList.contains('show')) pintarDesglose();
  }

  // ── Estados de carga (sin datos de ejemplo en producción) ──
  function mostrarCargando() {
    $('#menu').innerHTML = '<div class="loading"><div class="spinner"></div><p>Cargando la carta…</p></div>';
  }
  function mostrarError() {
    $('#menu').innerHTML =
      '<div class="loading"><div style="font-size:40px">📶</div>' +
      '<p>No hemos podido cargar la carta.<br>Comprueba tu conexión.</p>' +
      '<button class="chip" id="retry" style="margin-top:10px;padding:10px 20px">Reintentar</button></div>';
    $('#retry').onclick = cargar;
  }

  function cargar() {
    if (USE_DEMO) { aplicarConfig({}); carta = DEMO.map(withDefaults); render(); return; }
    mostrarCargando();
    fetch(MENU_URL, { headers: { 'Accept': 'application/json' } })
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(data => {
        aplicarConfig((data && data.config) || {});
        const rows = Array.isArray(data) ? data : (data.carta || data.items || []);
        const real = rows.map(withDefaults).filter(p => p.cat && p.nom);
        if (!real.length) return mostrarError();
        carta = real; render();
      })
      .catch(e => { console.warn('Error al cargar la carta:', e.message); mostrarError(); });
  }

  // ── Render carta ──
  function render() {
    $('#loading') && $('#loading').remove();
    const cats = [...new Set(carta.map(p => p.cat))];

    const chips = $('#cats');
    chips.innerHTML = '';
    cats.forEach((c, i) => {
      const b = document.createElement('button');
      b.className = 'chip' + (i === 0 ? ' active' : '');
      b.textContent = c;
      b.onclick = () => document.getElementById('sec_' + i)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      chips.appendChild(b);
    });

    const menu = $('#menu');
    menu.innerHTML = '';
    cats.forEach((c, ci) => {
      const h = document.createElement('div');
      h.className = 'cat-title'; h.id = 'sec_' + ci; h.textContent = c;
      menu.appendChild(h);
      carta.forEach((p, idx) => { if (p.cat === c) menu.appendChild(itemRow(p, idx)); });
    });

    stickH = setupSticky();
    lastActive = -1;
    updateActiveChip();
    refreshBar();
  }

  function qtyEnCarrito(nom) {
    return lines.filter(l => l.nom === nom).reduce((s, l) => s + l.qty, 0);
  }

  // Añade una línea al carrito (fusiona si mismo plato y misma nota)
  function addLinea(p, qty, nota) {
    nota = (nota || '').trim();
    const ex = lines.find(l => l.nom === p.nom && (l.nota || '') === nota);
    if (ex) ex.qty += qty;
    else lines.push({ nom: p.nom, prec: p.prec, qty, nota });
    saveCart(); render();
  }

  // Mensaje propio (sin diálogos del navegador)
  let toastT;
  function toast(msg) {
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2600);
  }

  function itemRow(p, idx) {
    const row = document.createElement('div');
    row.className = 'item' + (p.disp ? '' : ' sold');
    row.dataset.name = p.nom.toLowerCase();
    const q = qtyEnCarrito(p.nom);
    const star  = p.dest ? '<span class="star">★</span>' : '';
    const badge = p.disp ? '' : '<span class="sold-badge">Agotado</span>';
    row.innerHTML =
      `<div class="item-info">
         <p class="item-name">${star}${esc(p.nom)}${badge}</p>
         ${p.desc ? `<p class="item-desc">${esc(p.desc)}</p>` : ''}
         <span class="item-price">${fmt(p.prec)}</span>
       </div>` +
      (p.disp ? `<button class="item-add" aria-label="Añadir">+${q ? `<span class="qbadge">${q}</span>` : ''}</button>` : '');
    if (p.disp) {
      // Tocar el plato → ficha con opciones; "+" → añadir directo
      row.onclick = () => abrirFicha(idx);
      row.querySelector('.item-add').onclick = (e) => { e.stopPropagation(); addLinea(p, 1, ''); };
    } else {
      row.onclick = () => toast('Este plato está agotado ahora mismo');
    }
    return row;
  }

  // ── Ficha de plato ──
  function abrirFicha(idx) {
    dishIdx = idx; dishQty = 1;
    const p = carta[idx];
    $('#dishName').textContent = p.nom;
    $('#dishDesc').textContent = p.desc || 'Sin descripción disponible.';
    pintarAlergenos(p);
    $('#dishPrice').textContent = fmt(p.prec);
    $('#dishNote').value = '';
    $('#dishQty').textContent = '1';
    actualizarBotonFicha();
    $('#dish').classList.add('show');
  }
  function pintarAlergenos(p) {
    const el = $('#dishAlerg');
    if (p.alerg && p.alerg.length) {
      el.innerHTML = '<div class="alerg-title">Alérgenos</div><div class="alerg-wrap">' +
        p.alerg.map(a => `<span class="alerg">${esc(a)}</span>`).join('') + '</div>';
    } else {
      el.innerHTML = '<p class="alerg-none">Alérgenos no especificados — consúltalos con el restaurante.</p>';
    }
  }
  function cerrarFicha() { $('#dish').classList.remove('show'); }
  function actualizarBotonFicha() {
    const p = carta[dishIdx];
    $('#dishAdd').textContent = `Añadir · ${fmt(p.prec * dishQty)}`;
  }
  $('#dishClose').onclick = cerrarFicha;
  $('#dish').onclick = e => { if (e.target.id === 'dish') cerrarFicha(); };
  $('#dishMinus').onclick = () => { dishQty = Math.max(1, dishQty - 1); $('#dishQty').textContent = dishQty; actualizarBotonFicha(); };
  $('#dishPlus').onclick  = () => { dishQty++; $('#dishQty').textContent = dishQty; actualizarBotonFicha(); };
  $('#dishAdd').onclick = () => {
    addLinea(carta[dishIdx], dishQty, $('#dishNote').value);
    cerrarFicha();
  };

  // ── Sticky + scrollspy ──
  function setupSticky() {
    const header = document.querySelector('header');
    const cats = document.getElementById('cats');
    const hH = header.offsetHeight;
    cats.style.top = hH + 'px';
    const stick = hH + cats.offsetHeight;
    document.querySelectorAll('.cat-title').forEach(t => t.style.scrollMarginTop = (stick + 6) + 'px');
    return stick;
  }
  function updateActiveChip() {
    const titles = [...document.querySelectorAll('.cat-title')].filter(t => t.style.display !== 'none');
    if (!titles.length) return;
    let idx = 0;
    for (let i = 0; i < titles.length; i++) if (titles[i].getBoundingClientRect().top <= stickH + 8) idx = i;
    if (idx === lastActive) return;
    lastActive = idx;
    const chips = [...document.querySelectorAll('.chip')];
    chips.forEach((c, i) => c.classList.toggle('active', i === idx));
    const cats = document.getElementById('cats');
    const chip = chips[idx];
    if (chip) cats.scrollTo({ left: chip.offsetLeft - cats.clientWidth / 2 + chip.clientWidth / 2, behavior: 'smooth' });
  }
  window.addEventListener('scroll', () => requestAnimationFrame(updateActiveChip), { passive: true });

  // ── Buscador ──
  $('#search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.item').forEach(el => {
      el.style.display = !q || el.dataset.name.includes(q) ? '' : 'none';
    });
    document.querySelectorAll('.cat-title').forEach(h => {
      let n = h.nextElementSibling, vis = false;
      while (n && n.classList.contains('item')) { if (n.style.display !== 'none') vis = true; n = n.nextElementSibling; }
      h.style.display = vis ? '' : 'none';
    });
  });

  // ── Totales / barra ──
  function subtotal() { return lines.reduce((s, l) => s + l.prec * l.qty, 0); }
  function numItems() { return lines.reduce((s, l) => s + l.qty, 0); }
  function envioActual() { return entrega === 'delivery' ? COSTE_ENVIO : 0; }
  function totalActual() { return subtotal() + envioActual(); }

  function refreshBar() {
    const n = numItems();
    $('#barCount').textContent = `${n} · ${fmt(subtotal())}`;
    $('#bar').classList.toggle('show', n > 0);
  }

  // ── Checkout ──
  $('#goCheckout').onclick = () => { if (!numItems()) return; pintarCarrito(); $('#checkout').classList.add('show'); };
  $('#back').onclick = () => $('#checkout').classList.remove('show');

  function pintarCarrito() {
    const cont = $('#cartLines'); cont.innerHTML = '';
    if (!lines.length) { cont.innerHTML = '<p style="color:var(--muted)">Tu pedido está vacío.</p>'; }
    lines.forEach((l, i) => {
      const row = document.createElement('div');
      row.className = 'cline';
      row.innerHTML =
        `<div class="cline-body">
           <div class="cline-name">${esc(l.nom)}</div>
           <div class="cline-note">${l.nota ? '📝 ' + esc(l.nota) + ' ' : ''}<button data-edit="${i}">${l.nota ? 'editar' : '+ nota'}</button></div>
         </div>
         <div class="cline-right">
           <span class="cline-sub">${fmt(l.prec * l.qty)}</span>
           <div class="cline-ctrl">
             <button data-dec="${i}">−</button>
             <span class="n">${l.qty}</span>
             <button data-inc="${i}">+</button>
           </div>
         </div>`;
      cont.appendChild(row);
    });
    cont.querySelectorAll('[data-inc]').forEach(b => b.onclick = () => { lines[+b.dataset.inc].qty++; saveCart(); pintarCarrito(); render(); });
    cont.querySelectorAll('[data-dec]').forEach(b => b.onclick = () => {
      const i = +b.dataset.dec; lines[i].qty--; if (lines[i].qty <= 0) lines.splice(i, 1);
      saveCart(); pintarCarrito(); render();
      if (!lines.length) $('#checkout').classList.remove('show');
    });
    cont.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => {
      const i = +b.dataset.edit;
      const noteDiv = b.closest('.cline-note');
      noteDiv.innerHTML = `<input class="note-inp" type="text" maxlength="80" placeholder="Indicación para este plato" value="${esc(lines[i].nota || '')}">`;
      const inp = noteDiv.querySelector('input');
      inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
      inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') inp.blur(); else if (ev.key === 'Escape') pintarCarrito(); });
      inp.addEventListener('blur', () => { lines[i].nota = inp.value.trim(); saveCart(); pintarCarrito(); });
    });
    pintarDesglose();
  }

  function pintarDesglose() {
    const sub = subtotal(), env = envioActual(), tot = sub + env;
    const bd = $('#breakdown');
    bd.innerHTML =
      `<div class="brk"><span>Subtotal</span><span>${fmt(sub)}</span></div>` +
      (entrega === 'delivery' ? `<div class="brk"><span>Envío</span><span>${fmt(env)}</span></div>` : '') +
      `<div class="brk total"><span>Total</span><span>${fmt(tot)}</span></div>`;

    const warn = $('#minWarn');
    let bloqueo = '';
    if (cerradoAhora)
      bloqueo = '🌙 Ahora mismo está cerrado. No se pueden enviar pedidos en este momento.';
    else if (entrega === 'delivery' && sub < PEDIDO_MINIMO)
      bloqueo = `Pedido mínimo para domicilio: ${fmt(PEDIDO_MINIMO)}. Te faltan ${fmt(PEDIDO_MINIMO - sub)}.`;
    else if (entrega === 'pickup' && MIN_RECOGIDA && sub < MIN_RECOGIDA)
      bloqueo = `Pedido mínimo para recoger: ${fmt(MIN_RECOGIDA)}. Te faltan ${fmt(MIN_RECOGIDA - sub)}.`;
    if (bloqueo) { warn.textContent = bloqueo; warn.classList.remove('hidden'); $('#send').disabled = true; }
    else { warn.classList.add('hidden'); $('#send').disabled = false; }
    actualizarCambio();
  }

  // ── Entrega / pago ──
  $('#tgEntrega').querySelectorAll('button').forEach(b => b.onclick = () => {
    $('#tgEntrega').querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    entrega = b.dataset.e;
    $('#dirWrap').classList.toggle('hidden', entrega !== 'delivery');
    pintarDesglose();
  });
  $('#tgPago').querySelectorAll('button').forEach(b => b.onclick = () => {
    $('#tgPago').querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    pago = b.dataset.p;
    $('#cashWrap').classList.toggle('hidden', pago !== 'metalico');
    actualizarCambio();
  });
  $('#fPagaCon').addEventListener('input', actualizarCambio);

  function actualizarCambio() {
    const info = $('#cambioInfo');
    if (pago !== 'metalico') { info.textContent = ''; return; }
    const pc = parseFloat(($('#fPagaCon').value || '').replace(',', '.'));
    const tot = totalActual();
    if (!pc) { info.textContent = ''; return; }
    if (pc < tot) info.innerHTML = `<span style="color:var(--danger)">Importe insuficiente</span><span></span>`;
    else info.innerHTML = `<span>Cambio a devolver</span><span><b>${fmt(pc - tot)}</b></span>`;
  }

  // ── Envío del pedido ──
  $('#send').onclick = async () => {
    const nombre = $('#fNombre').value.trim();
    const tel    = $('#fTel').value.trim();
    const notas  = $('#fNotas').value.trim();
    if (cerradoAhora) { toast('Ahora mismo está cerrado'); return; }
    if (!nombre) { toast('Añade tu nombre'); $('#fNombre').focus(); return; }
    if (!tel)    { toast('Añade tu teléfono'); $('#fTel').focus(); return; }
    if (!numItems()) { toast('Tu pedido está vacío'); return; }
    if (entrega === 'pickup' && MIN_RECOGIDA && subtotal() < MIN_RECOGIDA) { toast('No llegas al pedido mínimo para recoger'); return; }

    let direccion = null, direccionTxt = '';
    if (entrega === 'delivery') {
      const calle = $('#aCalle').value.trim(), numero = $('#aNumero').value.trim();
      const piso = $('#aPiso').value.trim(), cp = $('#aCp').value.trim();
      const ciudad = $('#aCiudad').value.trim(), notaDir = $('#aNota').value.trim();
      if (!calle)  { toast('Añade la calle'); $('#aCalle').focus(); return; }
      if (!numero) { toast('Añade el número'); $('#aNumero').focus(); return; }
      if (subtotal() < PEDIDO_MINIMO) { toast('No llegas al pedido mínimo para domicilio'); return; }
      direccion = { calle, numero, piso, cp, ciudad, nota: notaDir };
      direccionTxt = `${calle} ${numero}${piso ? ', ' + piso : ''}${cp || ciudad ? ' — ' + [cp, ciudad].filter(Boolean).join(' ') : ''}`;
    }

    let pagaCon = null, cambio = null;
    if (pago === 'metalico') {
      const pc = parseFloat(($('#fPagaCon').value || '').replace(',', '.'));
      if (pc) { pagaCon = pc; cambio = +(pc - totalActual()).toFixed(2); }
    }

    const payload = {
      wa: WA, r: RID,
      cliente: { nombre, tel },
      entrega,
      direccion, direccionTxt,
      pago: { metodo: pago, pagaCon, cambio },
      notas,
      items: lines.map(l => ({ nom: l.nom, prec: l.prec, qty: l.qty, nota: l.nota || '' })),
      subtotal: subtotal(), envio: envioActual(), total: totalActual()
    };

    const btn = $('#send'); btn.disabled = true; btn.textContent = 'Enviando…';
    try {
      const r = await fetch(PEDIDO_URL, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      lines = []; saveCart(); render();
      $('#checkoutBody').classList.add('hidden');
      $('#done').classList.remove('hidden');
    } catch (e) {
      toast('No se pudo enviar. Inténtalo de nuevo.');
      btn.disabled = false; btn.textContent = 'Enviar pedido';
    }
  };

  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

  // ── Init ──
  if (WA)   $('#fTel').value = '+' + WA;
  if (NAME) $('#fNombre').value = NAME;
  loadCart();
  cargar();
  setInterval(evaluarHorario, 60000);   // recalcula abierto/cerrado si la página sigue abierta
})();
</script>
</body>
</html>
